name: Build and Deploy Property API

on:
  push:
    branches:
      - main
    paths:
      - "app/property-api/**"

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: property-api
  CONTAINER_NAME: property-api
  APP_PORT: 5000

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push Docker image
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          IMAGE_URI=$ACCOUNT_ID.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:latest

          docker build -t $IMAGE_URI app/property-api
          docker push $IMAGE_URI

          echo "IMAGE_URI=$IMAGE_URI" >> $GITHUB_ENV

      - name: Deploy to Linux EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.LINUX_EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.LINUX_EC2_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com

            docker pull ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/property-api:latest

            docker rm -f property-api || true

            docker run -d \
              --name property-api \
              --restart unless-stopped \
              -p 5000:5000 \
              ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com/property-api:latest

            curl http://localhost:5000/health
